name: Build and Publish

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: dist-sdist
          path: dist/*.tar.gz

  build_wheels:
    name: Build wheels on ${{ matrix.os }} (Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies (Windows / macOS)
        if: matrix.os != 'ubuntu-latest'
        run: python -m pip install --upgrade pip setuptools wheel build Cython

      - name: Build wheels (Windows / macOS)
        if: matrix.os != 'ubuntu-latest'
        run: python -m build --wheel

      - name: Set CIBW_BUILD env for Linux
        if: matrix.os == 'ubuntu-latest'
        run: |
          PY_VER="${{ matrix.python-version }}"
          echo "CIBW_BUILD=cp${PY_VER//./}-manylinux_x86_64" >> $GITHUB_ENV

      - name: Build wheels (Linux / manylinux)
        if: matrix.os == 'ubuntu-latest'
        uses: pypa/cibuildwheel@v2.22.0
        with:
          output-dir: dist

      - name: Upload wheels artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-wheels-${{ matrix.os }}-${{ matrix.python-version }}
          path: dist/*.whl

  publish_pypi:
    name: Publish to PyPI
    needs: [build_sdist, build_wheels]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          merge-multiple: true
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true